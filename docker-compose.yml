version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datacrazy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/datacrazy
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pgdata:
